<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Delivery Helper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow-sm p-4 border-0">
            <h3 class="text-center mb-4 text-primary fw-bold">Create Account</h3>
            <form action="/register" method="POST">
                <div class="mb-3">
                    <input type="text" class="form-control" name="username" placeholder="Choose a Username" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" name="password" placeholder="Create a Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Register</button>
            </form>
            <div class="text-center mt-3">
                <a href="/login" class="text-decoration-none">Already have an account? Login here.</a>
            </div>
        </div>
    </div>
</body>
</html>
