<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Delivery Helper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 400px;">
        <div class="card shadow-sm p-4 border-0">
            <h3 class="text-center mb-4 text-primary fw-bold">Welcome Back</h3>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <input type="text" class="form-control" name="username" placeholder="Username" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">Login</button>
            </form>
            <div class="text-center mt-3">
                <a href="/register" class="text-decoration-none">Don't have an account? Register here.</a>
            </div>
        </div>
    </div>
</body>
</html>
